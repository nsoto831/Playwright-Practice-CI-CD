name: sep smoke tests

on:
  push: # Auto-trigger the workflow on push to main or master branches
    branches:
      - main
      - master
  pull_request: # Auto-trigger the workflow on pull requests to main or master branches
    branches:
      - main
      - master
  schedule:
    - cron: "0 13 * * *" # Runs every day at 8:00 AM EST
  workflow_dispatch: # Allows manual trigger

jobs:
  test:
    timeout-minutes: 5
    runs-on: ubuntu-latest # Virtual machine (macos-latest, windows-latest, ubuntu-latest)

    # setup the node js
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25.8"
          cache: "npm"

      #installs the dependencies
      - name: Install dependencies
        run: npm ci

      # installs the Playwright browsers (chromium, firefox, webkit) for testing. Note: Replace 'chromium' with the 'browser' you want to test.
      # - name: Install Playwright browsers
      # - run: npx playwright install --with-deps
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # configures the environment variables for the tests
      - name: configure environment variables
        run: |
          echo "SEP_USERNAME=${{ secrets.SEP_USERNAME }}" >> $GITHUB_ENV
          echo "SEP_PASSWORD=${{ secrets.SEP_PASSWORD }}" >> $GITHUB_ENV
          echo "SEP_QA_URL=${{ secrets.SEP_QA_URL }}" >> $GITHUB_ENV

      # By default tests run in headless mode (without a GUI) unless specified otherwise in 'run' configuration where you can pass the '--headed' flag to run tests with a visible browser window
      - name: Run Playwright tests
        run: npm run tests:run tests with tag

      # Upload test results and reports
      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30
